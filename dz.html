<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Уведомление о задолженности</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f4f7fb;
    font-family:Inter, Arial, sans-serif;
    padding:40px 20px;
}

.container{
    max-width:700px;
    margin:auto;
    background:white;
    border-radius:24px;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,.08);
}

.header{
    padding:40px;
    text-align:center;
    background:linear-gradient(
        135deg,
        #0f172a,
        #2563eb,
        #7c3aed
    );
}

.header h1{
    font-size:42px;
    font-weight:800;

    background:linear-gradient(
        90deg,
        #ffffff,
        rgba(255,255,255,.65)
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.content{
    padding:40px;
}

.text{
    font-size:18px;
    line-height:1.8;
    color:#334155;
}

.debt{
    margin:30px 0;
    padding:30px;

    border-radius:20px;

    background:linear-gradient(
        135deg,
        #eef2ff,
        #f5f3ff
    );

    text-align:center;

    transition:.3s;
}

.debt:hover{
    transform:translateY(-5px);
    box-shadow:0 15px 35px rgba(37,99,235,.2);
}

.debt-label{
    color:#6366f1;
    text-transform:uppercase;
    letter-spacing:2px;
    font-size:13px;
    font-weight:700;
}

.debt-amount{
    margin-top:12px;
    font-size:48px;
    font-weight:800;
    color:#dc2626;
}

.notice{
    background:#eff6ff;
    border-left:5px solid #2563eb;
    padding:20px;
    border-radius:14px;
    margin:25px 0;
}

.tags{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:25px;
}

.tag{
    padding:10px 16px;
    border-radius:999px;
    font-size:13px;
    font-weight:600;
}

.blue{
    background:#dbeafe;
    color:#1d4ed8;
}

.red{
    background:#fee2e2;
    color:#b91c1c;
}

.yellow{
    background:#fef3c7;
    color:#92400e;
}

.purple{
    background:#ede9fe;
    color:#6d28d9;
}

.footer{
    padding:25px;
    text-align:center;
    color:#64748b;
    font-size:14px;
    border-top:1px solid #e5e7eb;
}

@media(max-width:768px){

    .header h1{
        font-size:30px;
    }

    .content{
        padding:25px;
    }

    .debt-amount{
        font-size:36px;
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>Уведомление о задолженности</h1>
    </div>

    <div class="content">

        <div class="text">
            Добрый день,
        </div>

        <div class="debt">
            <div class="debt-label">
                Сумма задолженности
            </div>

            <div class="debt-amount">
                10 000 ₽
            </div>
        </div>

        <div class="notice">
            Просьба сообщить, когда будет произведена оплата.
        </div>

        <div class="tags">
            <span class="tag blue">Оплата</span>
            <span class="tag red">Задолженность</span>
            <span class="tag yellow">Требуется ответ</span>
            <span class="tag purple">Финансы</span>
        </div>

    </div>

    <div class="footer">
        Если оплата уже произведена, пожалуйста, направьте подтверждение платежа.
    </div>

</div>

</body>
</html>
